# Local development services. For cloud deployment, replace DATABASE_URL,
# QDRANT_URL (+QDRANT_API_KEY), and REDIS_URL in .env with managed service
# URLs (Neon, Qdrant Cloud, Upstash) — no Docker containers needed.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quant
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - quant-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - quant-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - quant-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  flower:
    image: mher/flower:latest
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - quant-net

volumes:
  pgdata:
  qdrant_data:

networks:
  quant-net:
    driver: bridge
